include: package:lints/recommended.yaml

# For lint rules and documentation, see https://dart.dev/lints.
linter:
  rules:
    # The public protocol API intentionally keeps the BEP0029 wire-field
    # names (MAX_UINT16, ST_DATA, seq_nr, wnd_size, ack_nr, ...). Renaming
    # them to lowerCamelCase would break the package's public contract and
    # every downstream consumer, so these style rules are disabled.
    constant_identifier_names: false
    non_constant_identifier_names: false
    # Internal close-handler callbacks pass the private _UTPSocket type; this
    # is by design (the type is not part of the consumer-facing surface).
    library_private_types_in_public_api: false
